<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dice Duel</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400..700;1,400..700&family=Marcellus&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&family=Michroma&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Permanent+Marker&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js" defer></script>
  </head>
  <body>
    <h1>Dice Duel</h1>
    <div class="container">
      <div class="player0">
        <h2 class="players">Player 1</h2>
        <h2 class="topscore">Top Score</h2>
        <h2 class="topscorevalue top0">0</h2>
        <h2 class="currentscore">Current Score</h2>
        <div class="currentscorecontainer">
          <div class="scorecontainer">
            <h2 class="currentscorevalue current0">0</h2>
          </div>
        </div>
      </div>
      <div class="player1">
        <h2 class="players">player 2</h2>
        <h2 class="topscore">Top Score</h2>
        <h2 class="topscorevalue top1">0</h2>
        <h2 class="currentscore">Current Score</h2>
        <div class="currentscorecontainer">
          <div class="scorecontainer">
            <h2 class="currentscorevalue current1">0</h2>
          </div>
        </div>
      </div>
      <button type="button" class="btn btn-primary btn-sm rolldice">
        🎲 Roll Dice
      </button>
      <button type="button" class="btn btn-primary btn-sm hold">⏸️ Hold</button>
      <button type="button" class="btn btn-primary btn-sm reset">
        🔄 reset
      </button>
      <div class="dicecontainer">
        <img class="dice" id="firstdice" src="./diceImages/dice 6.png" />
        <img class="dice" id="seconddice" src="./diceImages/dice 6.png" />
      </div>
    </div>
  </body>
</html>
